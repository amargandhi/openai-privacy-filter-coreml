name: Smoke

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/check_environment.py --no-fail-missing-optional
      - run: python -m ruff check .
      - run: python -m pytest
      - run: swift test
